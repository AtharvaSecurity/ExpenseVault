version: '3.9'

services:
  mysql:
    image: mysql:8.0
    container_name: expensevault-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: expensevault
      MYSQL_USER: expensevault
      MYSQL_PASSWORD: expensevault_password
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'root', '-proot_password']
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - expensevault-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: expensevault-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: mysql://expensevault:expensevault_password@mysql:3306/expensevault
      JWT_SECRET: ${JWT_SECRET:-change_this_to_a_long_random_secret_in_production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
    ports:
      - '3000:3000'
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - expensevault-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000/api/v1}
    container_name: expensevault-frontend
    restart: unless-stopped
    ports:
      - '5173:80'
    depends_on:
      - backend
    networks:
      - expensevault-network

networks:
  expensevault-network:
    driver: bridge

volumes:
  mysql_data:
